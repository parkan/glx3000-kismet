# survey device overrides
# kismet_site.conf takes precedence over all other config files

# bind to localhost only -- survey-ui proxies what it needs
httpd_bind_address=127.0.0.1

# fixed credentials for local scripts (no way to disable auth entirely)
httpd_username=survey
httpd_password=survey

# log to USB if mounted, override at runtime via -p flag
log_prefix=/mnt/usb/kismet

# don't auto-start any datasources -- scan feeder pushes via API
# (no source= lines)
